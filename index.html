<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird - Master Edition</title>
  <style>
    body {
      margin: 0;
      background-color: #222;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas {
      background-color: #70c5ce;
      border: 4px solid #fff;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="400" height="500"></canvas>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // GAME STATES: "START", "PLAYING", "GAMEOVER"
    let gameState = "START";
    
    // BIRD VARIABLES
    let birdY = 200;
    let velocity = 0;
    const gravity = 0.4;
    const jump = -7;
    
    // GAME WORLD VARIABLES
    let pipes = [];
    const pipeWidth = 60;
    const pipeGap = 130;
    let frameCount = 0;
    let clouds = [];
    let currentSpeed = 2; 
    const minPipeDistance = 200; // Guaranteed horizontal pixel space between pipes
    
    // SCORE VARIABLES
    let score = 0;
    let highScore = localStorage.getItem("flappyHighScore") || 0;
    
    // INITIALIZE STARTING CLOUDS
    for(let i=0; i<3; i++) {
        clouds.push({ x: Math.random() * canvas.width, y: Math.random() * 200 + 20, speed: Math.random() * 0.5 + 0.5 });
    }

    // USER CONTROLS (DESKTOP & MOBILE)
    function flap() {
      if (gameState === "START") {
        gameState = "PLAYING";
        velocity = jump;
      } else if (gameState === "PLAYING") {
        velocity = jump;
      } else if (gameState === "GAMEOVER") {
        birdY = 200;
        velocity = 0;
        pipes = [];
        score = 0;
        frameCount = 0;
        currentSpeed = 2;
        gameState = "START";
      }
    }
    
    window.addEventListener("keydown", function(e) {
      if (e.code === "Space") flap();
    });
    
    window.addEventListener("touchstart", function(e) {
      e.preventDefault(); 
      flap();
    }, {passive: false});
    
    function drawClouds() {
      if (frameCount % 150 === 0 && gameState === "PLAYING") {
        clouds.push({ x: canvas.width, y: Math.random() * 200 + 20, speed: Math.random() * 0.5 + 0.5 });
      }
      ctx.font = "40px sans-serif";
      for (let i = 0; i < clouds.length; i++) {
        let c = clouds[i];
        if (gameState === "PLAYING") c.x -= c.speed;
        ctx.fillText("☁️", c.x, c.y);
        if (c.x + 50 < 0) {
          clouds.splice(i, 1);
          i--;
        }
      }
    }

    function triggerGameOver() {
      gameState = "GAMEOVER";
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("flappyHighScore", highScore);
      }
    }

    // MAIN ENGINE
    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // BACKGROUND
      drawClouds();

      if (gameState === "START") {
        birdY = 200 + Math.sin(Date.now() / 200) * 5; 
        
        ctx.save();
        ctx.translate(50 + 15, birdY + 15);
        ctx.scale(-1, 1); 
        ctx.font = "30px sans-serif";
        ctx.fillText("🐦", -15, 10);
        ctx.restore();
        
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 30px sans-serif";
        ctx.fillText("FLAPPY BIRD", 100, 200);
        ctx.font = "20px sans-serif";
        ctx.fillText("Tap or Space to Start", 105, 250);
        
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === "GAMEOVER") {
        ctx.fillStyle = "#73bf2e";
        for (let p of pipes) {
          ctx.fillRect(p.x, 0, pipeWidth, p.top);
          ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height - (p.top + pipeGap));
        }
        
        if (birdY < canvas.height - 30) birdY += 5;
        
        ctx.save();
        ctx.translate(50 + 15, birdY + 15);
        ctx.scale(-1, 1); 
        ctx.rotate(-Math.PI / 2); 
        ctx.font = "30px sans-serif";
        ctx.fillText("🐦", -15, 10);
        ctx.restore();

        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 40px sans-serif";
        ctx.fillText("GAME OVER", 75, 230);
        ctx.font = "20px sans-serif";
        ctx.fillText("Tap or Space to Restart", 95, 270);
        ctx.fillText("Score: " + score, 155, 310);
        
        requestAnimationFrame(gameLoop);
        return; 
      }
      
      // --- PLAYING STATE ---
      velocity += gravity;
      birdY += velocity;
      frameCount++;

      // Progressive Speed Difficulty cap
      currentSpeed = 2 + Math.min(3, Math.floor(score / 5) * 0.5);

      // FLOOR COLLISION
      if (birdY > canvas.height - 30) {
        triggerGameOver(); 
      }

      // FIXED PIPE SPAWN ENGINE (SPAWNS BY DISTANCE, NOT TIME)
      let canSpawnPipe = false;
      if (pipes.length === 0) {
        canSpawnPipe = true;
      } else {
        let lastPipe = pipes[pipes.length - 1];
        if (canvas.width - lastPipe.x >= minPipeDistance) {
          canSpawnPipe = true;
        }
      }

      if (canSpawnPipe) {
         let topPipeHeight = Math.floor(Math.random() * (canvas.height / 2.5)) + 40;
         pipes.push({ x: canvas.width, top: topPipeHeight, scored: false });
      }
      
      // DRAW & MOVE PIPES
      ctx.fillStyle = "#73bf2e";
      for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        p.x -= currentSpeed;
        
        let bottomPipeY = p.top + pipeGap;
        let bottomPipeHeight = canvas.height - bottomPipeY;
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, bottomPipeY, pipeWidth, bottomPipeHeight);

        // BOX COLLISION
        if (50 + 30 > p.x && 50 < p.x + pipeWidth && (birdY < p.top || birdY + 30 > p.top + pipeGap)) {
          triggerGameOver(); 
        }

        // SCORE CALCULATION
        if (p.x + pipeWidth < 50 && !p.scored) {
          score++;
          p.scored = true;
        }

        if (p.x + pipeWidth < 0) {
          pipes.splice(i, 1);
          i--;
        }
      }
         
      // DRAW BIRD WITH FORWARD TILT PHYSICS
      ctx.save();
      ctx.translate(50 + 15, birdY + 15);
      ctx.scale(-1, 1); 
      let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (velocity * 0.1)));
      ctx.rotate(-rotation); 
      ctx.font = "30px sans-serif";
      ctx.fillText("🐦", -15, 10);
      ctx.restore();

      // RENDER SCORES
      ctx.fillStyle = "#fff";
      ctx.font = "bold 24px sans-serif";
      ctx.fillText("Score: " + score, 20, 40);
      ctx.fillText("High Score: " + highScore, 20, 70);
      
      requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
  </script>
</body>
</html>
