<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flappy Bird</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #70c5ce; /* Matches sky color to prevent any seams */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    // TRUE FULLSCREEN ENGINE
    // Automatically grabs 100% of the screen dimensions, no matter the device
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let gameState = "START";
    
    // BIRD VARIABLES (Dynamically centered based on screen height)
    let birdY = canvas.height / 2;
    let velocity = 0;
    const gravity = 0.4;
    const jump = -7;
    
    // GAME WORLD VARIABLES
    let pipes = [];
    const pipeWidth = 60;
    const pipeGap = 140; // Slightly larger gap for better fullscreen gameplay balance
    let frameCount = 0;
    let clouds = [];
    let currentSpeed = 3; // Slightly faster base speed to account for wider screens
    const minPipeDistance = 250; // Keeps pipes perfectly spaced across massive screens
    
    // SCORE VARIABLES
    let score = 0;
    let highScore = localStorage.getItem("flappyHighScore") || 0;
    
    // INITIALIZE STARTING CLOUDS
    for(let i=0; i<5; i++) {
        clouds.push({ x: Math.random() * canvas.width, y: Math.random() * (canvas.height / 2), speed: Math.random() * 0.5 + 0.5 });
    }

    function flap() {
      if (gameState === "START") {
        gameState = "PLAYING";
        velocity = jump;
      } else if (gameState === "PLAYING") {
        velocity = jump;
      } else if (gameState === "GAMEOVER") {
        birdY = canvas.height / 2;
        velocity = 0;
        pipes = [];
        score = 0;
        frameCount = 0;
        gameState = "START";
      }
    }
    
    window.addEventListener("keydown", function(e) {
      if (e.code === "Space") flap();
    });
    
    window.addEventListener("touchstart", function(e) {
      e.preventDefault(); 
      flap();
    }, {passive: false});
    
    function drawClouds() {
      if (frameCount % 120 === 0 && gameState === "PLAYING") {
        clouds.push({ x: canvas.width, y: Math.random() * (canvas.height / 2), speed: Math.random() * 0.5 + 0.5 });
      }
      ctx.font = "40px sans-serif";
      for (let i = 0; i < clouds.length; i++) {
        let c = clouds[i];
        if (gameState === "PLAYING") c.x -= c.speed;
        ctx.fillText("☁️", c.x, c.y);
        if (c.x + 50 < 0) {
          clouds.splice(i, 1);
          i--;
        }
      }
    }

    function triggerGameOver() {
      gameState = "GAMEOVER";
      if (score > highScore) {
        highScore = score;
        localStorage.setItem("flappyHighScore", highScore);
      }
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      drawClouds();

      if (gameState === "START") {
        birdY = (canvas.height / 2) + Math.sin(Date.now() / 200) * 5; 
        
        ctx.save();
        ctx.translate(100 + 15, birdY + 15); // Shifted slightly right for widescreen feel
        ctx.scale(-1, 1); 
        ctx.font = "30px sans-serif";
        ctx.fillText("🐦", -15, 10);
        ctx.restore();
        
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 40px sans-serif";
        ctx.fillText("FLAPPY BIRD", (canvas.width / 2) - 120, canvas.height / 2 - 30);
        ctx.font = "20px sans-serif";
        ctx.fillText("Tap or Space to Start", (canvas.width / 2) - 95, canvas.height / 2 + 20);
        
        requestAnimationFrame(gameLoop);
        return;
      }

      if (gameState === "GAMEOVER") {
        ctx.fillStyle = "#73bf2e";
        for (let p of pipes) {
          ctx.fillRect(p.x, 0, pipeWidth, p.top);
          ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height - (p.top + pipeGap));
        }
        
        if (birdY < canvas.height - 30) birdY += 5;
        
        ctx.save();
        ctx.translate(100 + 15, birdY + 15);
        ctx.scale(-1, 1); 
        ctx.rotate(-Math.PI / 2); 
        ctx.font = "30px sans-serif";
        ctx.fillText("🐦", -15, 10);
        ctx.restore();

        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 40px sans-serif";
        ctx.fillText("GAME OVER", (canvas.width / 2) - 120, canvas.height / 2 - 20);
        ctx.font = "20px sans-serif";
        ctx.fillText("Tap or Space to Restart", (canvas.width / 2) - 105, canvas.height / 2 + 20);
        ctx.fillText("Score: " + score, (canvas.width / 2) - 45, canvas.height / 2 + 60);
        
        requestAnimationFrame(gameLoop);
        return; 
      }
      
      // PHYSICS
      velocity += gravity;
      birdY += velocity;
      frameCount++;

      currentSpeed = 3 + Math.min(4, Math.floor(score / 5) * 0.5);

      // GROUND COLLISION
      if (birdY > canvas.height - 40) {
        triggerGameOver(); 
      }

      // PIPE GENERATION
      let canSpawnPipe = false;
      if (pipes.length === 0) {
        canSpawnPipe = true;
      } else {
        let lastPipe = pipes[pipes.length - 1];
        if (canvas.width - lastPipe.x >= minPipeDistance) {
          canSpawnPipe = true;
        }
      }

      if (canSpawnPipe) {
         let topPipeHeight = Math.floor(Math.random() * (canvas.height / 2.5)) + 60;
         pipes.push({ x: canvas.width, top: topPipeHeight, scored: false });
      }
      
      ctx.fillStyle = "#73bf2e";
      for (let i = 0; i < pipes.length; i++) {
        let p = pipes[i];
        p.x -= currentSpeed;
        
        let bottomPipeY = p.top + pipeGap;
        let bottomPipeHeight = canvas.height - bottomPipeY;
        ctx.fillRect(p.x, 0, pipeWidth, p.top);
        ctx.fillRect(p.x, bottomPipeY, pipeWidth, bottomPipeHeight);

        // COLLISION (Bird is fixed at X = 100 for better widescreen perspective)
        if (100 + 30 > p.x && 100 < p.x + pipeWidth && (birdY < p.top || birdY + 30 > p.top + pipeGap)) {
          triggerGameOver(); 
        }

        if (p.x + pipeWidth < 100 && !p.scored) {
          score++;
          p.scored = true;
        }

        if (p.x + pipeWidth < 0) {
          pipes.splice(i, 1);
          i--;
        }
      }
         
      // RENDER BIRD
      ctx.save();
      ctx.translate(100 + 15, birdY + 15);
      ctx.scale(-1, 1); 
      let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (velocity * 0.1)));
      ctx.rotate(-rotation); 
      ctx.font = "30px sans-serif";
      ctx.fillText("🐦", -15, 10);
      ctx.restore();

      // RENDER SCORES
      ctx.fillStyle = "#fff";
      ctx.font = "bold 24px sans-serif";
      ctx.fillText("Score: " + score, 20, 40);
      ctx.fillText("High Score: " + highScore, 20, 70);
      
      requestAnimationFrame(gameLoop);
    }
    
    gameLoop();
  </script>
</body>
</html>
